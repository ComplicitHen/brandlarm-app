name: Bygg Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Bygg APK (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Sätt upp Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installera npm-beroenden
        run: npm install --legacy-peer-deps

      - name: Generera Android-projekt (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Gör gradlew körbart
        run: chmod +x android/gradlew

      - name: Bygg debug-APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Ladda upp APK som artifact
        uses: actions/upload-artifact@v4
        with:
          name: brandlarm-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
