name: Bygg Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Bygg release-APK
    runs-on: ubuntu-latest

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Sätt upp Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installera npm-beroenden
        run: npm install --legacy-peer-deps

      - name: Ta bort dev-verktyg (minskar APK-storlek ~50MB)
        run: npm uninstall expo-dev-client expo-dev-launcher expo-dev-menu --legacy-peer-deps

      - name: Generera Android-projekt (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Återskapa signeringsnyckel
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/brandlarm-release.keystore

      - name: Bygg release-APK (arm64 + Hermes)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/brandlarm-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PabiFilters="arm64-v8a" \
            --no-daemon
        working-directory: android

      - name: Ladda upp APK som artifact
        uses: actions/upload-artifact@v4
        with:
          name: brandlarm-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
